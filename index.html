<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Assistenze Tecniche</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fb; color: #333; }

    header { background: linear-gradient(135deg, #4CAF50, #2e7d32); color: white; padding: 20px 40px; font-size: 24px; font-weight: bold; }

    .kpi-container { display: flex; gap: 20px; padding: 20px 40px; flex-wrap: wrap; }

    .kpi { flex: 1; min-width: 200px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; }

    .kpi h4 { margin: 0; font-size: 14px; color: #777; }
    .kpi p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }

    .container { display: flex; gap: 30px; padding: 20px 40px; flex-wrap: wrap; }

    .card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 20px; }

    .table-card { flex: 1; min-width: 320px; }
    .chart-card { flex: 2; min-width: 400px; }

    table { width: 100%; border-collapse: collapse; }
    th { background: #4CAF50; color: white; padding: 10px; }
    td { padding: 8px; border-bottom: 1px solid #eee; }

    canvas { width: 100% !important; }

    @media (max-width: 900px) { .container, .kpi-container { flex-direction: column; } }
  </style>
</head>
<body>

<header>📊 Dashboard Assistenze Tecniche</header>
<div id="loading" style="padding:10px 40px;color:#555;">⏳ Caricamento dati...</div>

<div class="kpi-container">
  <div class="kpi">
    <h4>Totale</h4>
    <p id="total">-</p>
  </div>
  <div class="kpi">
    <h4>Mese con più assistenze</h4>
    <p id="best">-</p>
  </div>
</div>

<div class="container">

  <div class="card table-card">
    <h3>Dati (da Google Sheets)</h3>
    <table id="dataTable">
      <thead>
        <tr><th>Mese</th><th>Assistenze</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card chart-card">
    <h3>Grafico</h3>
    <canvas id="myChart"></canvas>
  </div>

</div>

<script>
  let chart;

  async function loadFromGoogleSheets() {
    document.getElementById("loading").style.display = "block";
    const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://docs.google.com/spreadsheets/d/e/2PACX-1vRUxNyEp91aBpQA-QYqYv0JKcmAMkaAbx6mdP7St4tSVLEqh8UkyB9nXjfSQa28dPUXgyBwUJRBfUjX/pub?output=csv");

    const response = await fetch(url);
    const data = await response.text();

    const rows = data.split("\n").slice(1);

    const months = [];
    const values = [];

    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    rows.forEach(row => {
      if (!row.trim()) return;

      // supporta sia virgola che punto e virgola
      const cols = row.includes(";") ? row.split(";") : row.split(",");

      const month = cols[0]?.trim();
      const value = parseInt(cols[1]) || 0;

      if (month) {
        months.push(month);
        values.push(value);

        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${month}</td><td>${value}</td>`;
        tbody.appendChild(tr);
      }
    });

    const total = values.reduce((a, b) => a + b, 0);
    let maxVal = 0;
    let bestMonth = "-";

    if (values.length > 0) {
      maxVal = Math.max(...values);
      bestMonth = months[values.indexOf(maxVal)] || "-";
    }

    document.getElementById("total").innerText = total;
    document.getElementById("best").innerText = bestMonth !== "-" ? bestMonth + " (" + maxVal + ")" : "-";

    if (chart) {
      chart.data.labels = months;
      chart.data.datasets[0].data = values;
      chart.update();
    } else {
      const ctx = document.getElementById('myChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{
            data: values,
            borderRadius: 8
          }]
        },
        options: {
          animation: {
            duration: 800
          },
          plugins: {
            legend: { display: false },
            datalabels: {
              anchor: 'end',
              align: 'top',
              formatter: value => value > 0 ? value : ''
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    document.getElementById("loading").style.display = "none"; else {
      const ctx = document.getElementById('myChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{
            data: values,
            borderRadius: 8
          }]
        },
        options: {
          plugins: {
            legend: { display: false },
            datalabels: {
              anchor: 'end',
              align: 'top',
              formatter: value => value > 0 ? value : ''
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }
  }

  loadFromGoogleSheets();


  // aggiornamento automatico ogni 10 secondi
  setInterval(loadFromGoogleSheets, 10000);
</script>

</body>
</html>
